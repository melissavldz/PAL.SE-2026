<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Profile</title>
    <link rel="stylesheet" href="global.css" />
    <style>
      body {
        margin: 0;
        font-family: "Inter-Regular", Helvetica, Arial, sans-serif;
        background: #f7f4f1;
        color: #2b2b2b;
      }

      .profile-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .profile-card {
        width: min(420px, 100%);
        background: #ffffff;
        border: 1px solid #00000014;
        border-radius: 10px;
        padding: 24px;
      }

      .profile-name {
        margin: 0 0 6px;
        font-size: 24px;
        font-family: "Inter-SemiBold", Helvetica, Arial, sans-serif;
      }

      .profile-role {
        margin: 0 0 16px;
        color: #84807a;
      }

      .back-link {
        display: inline-block;
        margin-top: 12px;
        color: #631820;
        font-family: "Inter-Medium", Helvetica, Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <main class="profile-page">
      <section class="profile-card" aria-label="Doctor profile">
        <h1 class="profile-name">Dr. Sarah Jenkins</h1>
        <p class="profile-role">Pediatrician</p>
        <p>Temporary profile page.</p>
        <a class="back-link" href="dashboard.html">Back to Dashboard</a>
      </section>
    </main>
  </body>
</html>
