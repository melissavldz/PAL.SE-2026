<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <div class="settings-profile">
      <div class="container">
        <div class="main-content">
          <header class="header">
            <div class="paragraph">
              <div class="text-wrapper">Profile</div>
              <div class="div">›</div>
              <div class="text-wrapper-2">Neonatal Sepsis Prediction</div>
            </div>
            <div class="container-wrapper">
              <div class="container-2">
                <div class="container-3">
                  <div class="div-wrapper"><div class="text-wrapper-3">Dr. Sarah Jenkins</div></div>
                  <div class="div-wrapper">
                    <div class="container-4"><div class="text-wrapper-4">Pediatrician</div></div>
                  </div>
                </div>
                <div class="background"><div class="text-wrapper-5">SJ</div></div>
              </div>
            </div>
          </header>
          <div class="main">
            <div class="container-5">
              <div class="div-wrapper-2"><div class="text-wrapper-6">Settings</div></div>
              <div class="div-wrapper-2"><div class="text-wrapper-7">Manage your account</div></div>
            </div>
            <div class="container-6">
              <div class="nav">
                <div class="background-2">
                  <div class="SVG-wrapper">
                    <img class="settings-nav-icon" src="images/profile.png" alt="Profile" />
                  </div>
                  <div class="container-7"><div class="text-wrapper-8">Profile</div></div>
                </div>
                <a class="container-8" href="profile-security.html" aria-label="Open security settings">
                  <div class="SVG-wrapper">
                    <img class="settings-nav-icon" src="images/security.png" alt="Security" />
                  </div>
                  <div class="container-9"><div class="text">Security</div></div>
                </a>
              </div>
              <div class="background-border">
                <div class="horizontal-border">
                  <div class="heading"><div class="text-wrapper-9">Profile Information</div></div>
                </div>
                <div class="container-10">
                  <div class="container-11">
                    <div class="background-3"><div class="text-2">SJ</div></div>
                    <div class="container-12">
                      <div class="container-13"><div class="text-wrapper-10">Dr. Sarah Jenkins</div></div>
                      <div class="container-14"><div class="text-3">Neonatologist</div></div>
                    </div>
                  </div>
                  <div class="container-15">
                    <div class="container-16">
                      <div class="container-17"><div class="text-wrapper-11">Full Name</div></div>
                      <div class="background-border-2">
                        <input id="profile-full-name" class="profile-input" type="text" value="Dr. Sarah Jenkins" aria-label="Full Name" />
                      </div>
                    </div>
                    <div class="container-18">
                      <div class="container-17"><div class="text-wrapper-13">Email</div></div>
                      <div class="background-border-2">
                        <input id="profile-email" class="profile-input" type="email" value="s.jenkins@hospital.org" aria-label="Email" />
                      </div>
                    </div>
                    <div class="container-19">
                      <div class="container-17"><div class="text-wrapper-15">Department</div></div>
                      <div class="background-border-2">
                        <input id="profile-department" class="profile-input" type="text" value="Neonatal ICU" aria-label="Department" />
                      </div>
                    </div>
                    <div class="container-20">
                      <div class="container-17"><div class="text-wrapper-16">Role</div></div>
                      <div class="background-border-2">
                        <input id="profile-role" class="profile-input" type="text" value="Pediatrician" aria-label="Role" />
                      </div>
                    </div>
                    <div class="container-21">
                      <div class="container-17"><div class="text-wrapper-18">Phone</div></div>
                      <div class="background-border-2">
                        <input id="profile-phone" class="profile-input" type="text" value="+63 963 985 3000" aria-label="Phone" />
                      </div>
                    </div>
                    <div class="container-22">
                      <div class="container-17"><div class="text-wrapper-20">License Number</div></div>
                      <div class="background-border-2">
                        <input id="profile-license" class="profile-input" type="text" value="MD-2024-1847" aria-label="License Number" />
                      </div>
                    </div>
                  </div>
                </div>
                <div class="button-wrapper">
                  <button id="save-profile-btn" class="button" type="button">
                    <img class="save-changes-icon" src="images/save-changes-button.png" alt="Save changes" />
                    <div class="text-6">Save Changes</div>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="aside-sidebar profile-sidebar">
          <div class="nav">
            <div class="link-margin">
              <a class="link sidebar-link is-active" href="dashboard.html" aria-label="Open dashboard" aria-current="page">
                <svg class="img icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3" y="3" width="8" height="8" rx="1"></rect>
                  <rect x="13" y="3" width="8" height="5" rx="1"></rect>
                  <rect x="13" y="10" width="8" height="11" rx="1"></rect>
                  <rect x="3" y="13" width="8" height="8" rx="1"></rect>
                </svg>
                <div class="text">Dashboard</div>
              </a>
            </div>
            <div class="link-wrapper">
              <a class="div sidebar-link" href="patients.html" aria-label="Open patients">
                <svg class="img icon-svg sidebar-icon-patients" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="8" cy="8" r="3.5"></circle>
                  <circle cx="16.5" cy="9" r="2.8"></circle>
                  <path d="M2.5 19.5a5.5 5.5 0 0 1 11 0"></path>
                  <path d="M13 19.5a4.3 4.3 0 0 1 7.5 0"></path>
                </svg>
                <div class="text-wrapper">Patients</div>
              </a>
            </div>
            <div class="link-wrapper">
              <a class="div sidebar-link" href="reports.html" aria-label="Open reports">
                <svg class="img icon-svg sidebar-icon-reports" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M14 2.5H7a2 2 0 0 0-2 2v15a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8.5z"></path>
                  <path d="M14 2.5v6h6"></path>
                  <line x1="9" y1="13" x2="15" y2="13"></line>
                  <line x1="9" y1="17" x2="15" y2="17"></line>
                </svg>
                <div class="text-2">Reports</div>
              </a>
            </div>
            <div class="link-margin-2"></div>
          </div>
          <div class="button-margin">
            <a class="group" href="login.html" aria-label="Logout">
              <div class="div-wrapper">
                <div class="div-wrapper">
                  <div class="SVG">
                    <svg class="vector logout-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                      <path d="M10 17l-5-5 5-5"></path>
                      <path d="M5 12h13"></path>
                    </svg>
                  </div>
                </div>
              </div>
              <div class="text-3">Logout</div>
            </a>
          </div>
          <div class="aside-brand">
            <img class="image" src="images/logo.png" alt="PAL.SE logo" />
            <img class="image-2" src="images/name.png" alt="PAL.SE" />
          </div>
        </div>
      </div>
    </div>
    <script src="profile.js"></script>
  </body>
</html>
