<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="profile-security.css" />
  </head>
  <body>
    <div class="settings-profile">
      <div class="container">
        <div class="main-content">
          <header class="header">
            <div class="paragraph">
              <div class="text-wrapper">Profile</div>
              <div class="div">›</div>
              <div class="text-wrapper-2">Neonatal Sepsis Prediction</div>
            </div>
            <div class="container-wrapper">
              <div class="container-2">
                <div class="container-3">
                  <div class="div-wrapper"><div class="text-wrapper-3">Dr. Sarah Jenkins</div></div>
                  <div class="div-wrapper">
                    <div class="container-4"><div class="text-wrapper-4">Pediatrician</div></div>
                  </div>
                </div>
                <div class="background"><div class="text-wrapper-5">SJ</div></div>
              </div>
            </div>
          </header>
          <div class="main">
            <div class="container-5">
              <div class="div-wrapper-2"><div class="text-wrapper-6">Settings</div></div>
              <div class="div-wrapper-2"><div class="text-wrapper-7">Manage your account</div></div>
            </div>
            <div class="container-6 security-content-row">
              <nav class="nav settings-tabs" aria-label="Settings sections">
                <a class="settings-tab" href="profile.html" aria-label="Profile settings">
                  <svg class="settings-tab-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="8" r="3.5"></circle>
                    <path d="M5.5 19a6.5 6.5 0 0 1 13 0"></path>
                  </svg>
                  <span>Profile</span>
                </a>
                <a class="settings-tab is-active" href="profile-security.html" aria-label="Security settings" aria-current="page">
                  <img class="settings-nav-icon" src="images/security.png" alt="Security" />
                  <span>Security</span>
                </a>
              </nav>

              <section class="security-card" aria-label="Security Settings">
                <h2 class="security-title">Security Settings</h2>

                <div class="security-field">
                  <label class="security-label" for="current-password">CURRENT PASSWORD</label>
                  <input id="current-password" class="security-input" type="password" value="password" />
                </div>

                <div class="security-field">
                  <label class="security-label" for="new-password">NEW PASSWORD</label>
                  <input id="new-password" class="security-input" type="password" placeholder="Enter new password" />
                </div>

                <div class="security-field">
                  <label class="security-label" for="confirm-password">CONFIRM PASSWORD</label>
                  <input id="confirm-password" class="security-input" type="password" placeholder="Confirm new password" />
                </div>

                <div class="security-actions">
                  <button class="security-update-btn" type="button" aria-label="Update Password">
                    <img class="save-changes-icon" src="images/save-changes-button.png" alt="Update password" />
                    <span>Update Password</span>
                  </button>
                </div>
              </section>
            </div>
          </div>
        </div>
        <div class="aside-sidebar profile-sidebar">
          <div class="nav">
            <div class="link-margin">
              <a class="link sidebar-link is-active" href="dashboard.html" aria-label="Open dashboard" aria-current="page">
                <svg class="img icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3" y="3" width="8" height="8" rx="1"></rect>
                  <rect x="13" y="3" width="8" height="5" rx="1"></rect>
                  <rect x="13" y="10" width="8" height="11" rx="1"></rect>
                  <rect x="3" y="13" width="8" height="8" rx="1"></rect>
                </svg>
                <div class="text">Dashboard</div>
              </a>
            </div>
            <div class="link-wrapper">
              <a class="div sidebar-link" href="patients.html" aria-label="Open patients">
                <svg class="img icon-svg sidebar-icon-patients" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="8" cy="8" r="3.5"></circle>
                  <circle cx="16.5" cy="9" r="2.8"></circle>
                  <path d="M2.5 19.5a5.5 5.5 0 0 1 11 0"></path>
                  <path d="M13 19.5a4.3 4.3 0 0 1 7.5 0"></path>
                </svg>
                <div class="text-wrapper">Patients</div>
              </a>
            </div>
            <div class="link-wrapper">
              <a class="div sidebar-link" href="reports.html" aria-label="Open reports">
                <svg class="img icon-svg sidebar-icon-reports" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M14 2.5H7a2 2 0 0 0-2 2v15a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8.5z"></path>
                  <path d="M14 2.5v6h6"></path>
                  <line x1="9" y1="13" x2="15" y2="13"></line>
                  <line x1="9" y1="17" x2="15" y2="17"></line>
                </svg>
                <div class="text-2">Reports</div>
              </a>
            </div>
            <div class="link-margin-2"></div>
          </div>
          <div class="button-margin">
            <a class="group" href="login.html" aria-label="Logout">
              <div class="div-wrapper">
                <div class="div-wrapper">
                  <div class="SVG">
                    <svg class="vector logout-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                      <path d="M10 17l-5-5 5-5"></path>
                      <path d="M5 12h13"></path>
                    </svg>
                  </div>
                </div>
              </div>
              <div class="text-3">Logout</div>
            </a>
          </div>
          <div class="aside-brand">
            <img class="image" src="images/logo.png" alt="PAL.SE logo" />
            <img class="image-2" src="images/name.png" alt="PAL.SE" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
